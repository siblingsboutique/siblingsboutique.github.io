    <script>
      const collectionGrid = document.getElementById("collection-grid");

      let collections = [];

      let activeCategory = "all";
      let activeGender = "all";

      async function loadCollections() {
        try {
          const response = await fetch(
            "../assets/datas/collection/collection.json",
          );

          collections = await response.json();

          renderCollections();
        } catch (error) {
          console.error("Failed to load collections:", error);
        }
      }

      function renderCollections() {
        let filtered = collections;

        // CATEGORY FILTER
        if (activeCategory !== "all") {
          filtered = filtered.filter(
            (item) => item.category === activeCategory,
          );
        }

        // GENDER FILTER
        if (activeGender !== "all") {
          filtered = filtered.filter((item) => item.gender === activeGender);
        }

        collectionGrid.innerHTML = filtered
          .map(
            (item) => `
      <article class="collection-item">
        <div class="collection-media">
          <img 
            src="${item.photo}" 
            alt="${item.title}"
            loading="lazy"
          >
        </div>

        <div class="collection-info">
          <span class="collection-tag">${item.category}</span>

          <h3>${item.title}</h3>

          <p class="collection-price">${item.price}</p>

          <a
            class="whatsapp-link"
            href="https://wa.me/7584060563?text=${encodeURIComponent(
              `Hi Siblings Creations, I am interested in ${item.category} - ${item.title}`,
            )}"
            target="_blank"
          >
            <i class="fa-brands fa-whatsapp"></i>  WHATSAPP 
          </a>
        </div>
      </article>
    `,
          )
          .join("");
      }

      // INITIAL LOAD
      loadCollections();

      // CATEGORY TABS
      const tabButtons = document.querySelectorAll(".tab-btn");

      tabButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          tabButtons.forEach((tab) => tab.classList.remove("active"));

          btn.classList.add("active");

          activeCategory = btn.dataset.category;

          renderCollections();
        });
      });

      // GENDER FILTER
      const genderFilter = document.getElementById("gender-filter");

      if (genderFilter) {
        genderFilter.addEventListener("change", (event) => {
          activeGender = event.target.value;

          renderCollections();
        });
      }

      // FILTER FAB
      const filterFab = document.getElementById("filter-fab");

      if (filterFab) {
        filterFab.addEventListener("click", () => {
          if (genderFilter) {
            genderFilter.focus();
            genderFilter.click();
          }
        });
      }
