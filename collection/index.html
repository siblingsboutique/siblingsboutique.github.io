        anchor.addEventListener("click", function (e) {
          e.preventDefault();
          const target = document.querySelector(this.getAttribute("href"));
          if (target) {
            target.scrollIntoView({
              behavior: "smooth",
              block: "start",
            });
            hamburger.classList.remove("active");
            navLinks.classList.remove("active");
          }
        });
      });

          photo: "assets/images/tihar-outfit.jpg",
        },
      ];

      const collectionGrid = document.getElementById("collection-grid");

      let activeCategory = "bridal";
      let activeGender = "all";

      function renderCollections() {
        let filtered;

        if (activeGender === "all") {
          filtered = collections.filter(
            (item) => item.category === activeCategory,
          );
        } else {
          filtered = collections.filter(
            (item) =>
              item.category === activeCategory && item.gender === activeGender,
          );
        }

        collectionGrid.innerHTML = filtered
          .map(
            (item) => `
      <article class="collection-item">
  <div class="collection-media">
    <img 
      src="https://picsum.photos/400/500?random=${Math.random()}" 
      alt="${item.title}"
    >

    
  </div>

  <div class="collection-info">
    <span class="collection-tag">${item.category}</span>

    <h3>${item.title}</h3>

    <p class="collection-price">${item.price}</p>

    <a
      class="whatsapp-link"
      href="${item.whatsapp_contact_link}"
      target="_blank"
    >
      WHATSAPP ORDER
    </a>
  </div>
</article>
    `,
          )
          .join("");
      }

      renderCollections();

      // CATEGORY TABS
      const tabButtons = document.querySelectorAll(".tab-btn");
      const genderFilter = document.getElementById("gender-filter");
      const filterFab = document.getElementById("filter-fab");

      tabButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          tabButtons.forEach((tab) => tab.classList.remove("active"));

          btn.classList.add("active");

          activeCategory = btn.dataset.category;

          renderCollections();
        });
      });

      // GENDER FILTER
      genderFilter.addEventListener("change", (event) => {
        activeGender = event.target.value;
        renderCollections();
      });

      if (filterFab) {
        filterFab.addEventListener("click", () => {
          if (genderFilter) {
            genderFilter.focus();
            genderFilter.click();
          }
        });
      }
